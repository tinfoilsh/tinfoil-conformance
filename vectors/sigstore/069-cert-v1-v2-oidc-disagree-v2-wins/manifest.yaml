id: 069-cert-v1-v2-oidc-disagree-v2-wins
stage: verify-sigstore
title: |
  Cert with V1 and V2 OIDC issuer extensions disagreeing — V2 takes precedence.
spec_refs: ["5.3"]
expects:
  exit_code: 0
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
  sigstore.oidc_issuer_v2_preferred: true
fixture_kind: synthetic
notes: |
  V1 (.1.1) carries 'https://gitlab.com/oidc'; V2 (.1.8) carries
  the GitHub Actions issuer; the policy pins the GitHub issuer. The
  canonical reading is V2-preferred (Fulcio deprecated V1), so all
  four SDKs accept: go/rs/js key on V2, and tinfoil-python now uses
  OIDCIssuerV2Preferred (V2 first, V1 fallback). Still gated on
  oidc_issuer_v2_preferred so any implementation that regresses to
  V1-only skips with a clear reason rather than failing noisily.
  See 069b for the inverse (V1 trusted, V2 untrusted) direction.
