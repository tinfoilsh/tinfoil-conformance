id: 066-cert-duplicate-sct-log
stage: verify-sigstore
title: |
  Leaf cert with two SCTs from the same CT log must reject — replay-amplification guard.
spec_refs: ["5.2"]
expects:
  exit_code: 10
  rejection_code: ["SCT_DUPLICATE_LOG", "SCT_INSUFFICIENT"]
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: synthetic
notes: |
  Both SCTs are signed by the same fixturegen CT log key (same log_id).
  tinfoil-rs explicitly rejects duplicate log_ids before counting
  SCTs (so threshold > 1 can't be trivially inflated) and emits
  SCT_DUPLICATE_LOG. @freedomofpress/sigstore-browser does the same.
  sigstore-python collapses missing-SCT and duplicate-SCT into the
  same 'Expected one certificate timestamp' error and emits
  SCT_INSUFFICIENT. List-form rejection accepts both — divergence is
  visible in the per-SDK column.
