id: 066-cert-duplicate-sct-log
stage: verify-sigstore
title: |
  Leaf cert with two SCTs from the same CT log must reject — replay-amplification guard.
spec_refs: ["5.2"]
expects:
  exit_code: 10
  rejection_code: "SCT_DUPLICATE_LOG"
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
  sigstore.rejects_duplicate_sct_log: true
fixture_kind: synthetic
notes: |
  Both SCTs are signed by the same fixturegen CT log key (same log_id).
  All four SDKs reject with SCT_DUPLICATE_LOG via an explicit
  per-log-id uniqueness guard (SPEC §5.2): tinfoil-rs and -js check a
  log-id set before counting SCTs; tinfoil-go adds checkDuplicateSCTLogs
  on top of sigstore-go (which dedups rather than rejecting); and
  tinfoil-python adds reject_duplicate_sct_logs ahead of sigstore-
  python's verify (which otherwise rejects this only incidentally via
  its exactly-one-SCT rule).
