id: 092-sct-signature-invalid
stage: verify-sigstore
title: |
  Leaf SCT that does not verify against the trust root's CT log key must reject.
spec_refs: ["5.2"]
expects:
  exit_code: 10
  rejection_code: ["SCT_INSUFFICIENT", "BUNDLE_MALFORMED", "DSSE_SIGNATURE_INVALID"]
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: real-frozen-bundle-mutation
notes: |
  Keeps each CT log's declared logId but swaps its public key, so the
  embedded SCT's signature no longer verifies. All SDKs reject (SCT
  verification fails); codes vary but the reason is uniform.
