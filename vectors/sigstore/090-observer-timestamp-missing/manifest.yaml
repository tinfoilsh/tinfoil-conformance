id: 090-observer-timestamp-missing
stage: verify-sigstore
title: |
  Bundle with no observer timestamp (no integratedTime, inclusion promise, or RFC3161) must reject.
spec_refs: ["5.2"]
expects:
  exit_code: 10
  rejection_code: ["OBSERVER_TIMESTAMP_INSUFFICIENT", "TLOG_COUNT_OUT_OF_RANGE", "BUNDLE_MALFORMED"]
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: real-frozen-bundle-mutation
notes: |
  SPEC §5.2 #5 requires at least 1 valid observer timestamp. This strips the
  tlog entry's integratedTime and inclusionPromise (SET) and clears
  timestampVerificationData, leaving only the Merkle inclusion proof.
  go/rs/py reject (no verifiable timestamp source); tinfoil-js via
  @freedomofpress/sigstore-browser accepts, i.e. does not enforce the
  observer-timestamp threshold. Divergence captured in list-form code.
