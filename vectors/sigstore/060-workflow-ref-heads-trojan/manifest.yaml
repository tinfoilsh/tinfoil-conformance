id: 060-workflow-ref-heads-trojan
stage: verify-sigstore
title: |
  Cert workflow ref 'refs/heads/main@refs/tags/v1' (trojan) must be rejected.
spec_refs: ["5.3"]
expects:
  exit_code: 10
  rejection_code: "WORKFLOW_REF_PREFIX_MISMATCH"
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: "supported"
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: synthetic
notes: |
  The recon's marquee differential vector. A cert with workflow ref
  'refs/heads/main@refs/tags/v1' embeds the substring 'refs/tags/'
  but does NOT start with it. SDKs doing loose substring/regex checks
  would accept; correct prefix-semantics implementations reject.
  
  Both Rust and JS use proper prefix matching today (we built it
  deliberately, see SPEC §5.3); this fixture is a regression guard
  that any future relaxation gets caught.
