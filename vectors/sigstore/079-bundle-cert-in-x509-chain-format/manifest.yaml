id: 079-bundle-cert-in-x509-chain-format
stage: verify-sigstore
title: |
  Bundle with cert at verificationMaterial.x509CertificateChain.
  certificates[0].rawBytes (legacy Sigstore v0.1/v0.2 format) must reject.
spec_refs: ["5.2"]
expects:
  exit_code: 10
  rejection_code: "BUNDLE_MALFORMED"
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
fixture_kind: real-frozen-bundle-mutation
notes: |
  Cert relocated from .verificationMaterial.certificate.rawBytes
  (v0.3 layout) to .verificationMaterial.x509CertificateChain.
  certificates[0].rawBytes (legacy v0.1/v0.2 layout). Per SPEC §5.2 the
  legacy layout MUST be rejected (it can carry CA certs; tinfoil only
  produces v0.3). All four SDKs reject: rs via its v0.3-only port, and
  go/py/js via an explicit tinfoil-layer guard over libs that would
  otherwise parse the legacy oneof.
