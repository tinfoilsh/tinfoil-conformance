id: 071-cert-missing-build-signer-uri
stage: verify-sigstore
title: |
  Cert without BuildSignerURI (.1.9) must accept — extension is informational only after the workflow_ref check moved to .1.6.
spec_refs: ["5.3"]
expects:
  exit_code: 0
required_capabilities:
  sigstore.trust_root_loading: "configurable"
  sigstore.verification_time_override: ["supported", "bundle-supplied-only"]
  sigstore.policy_fields_configurable.workflow_ref_prefix: true
  sigstore.policy_fields_configurable.predicate_types_allowed: true
fixture_kind: synthetic
notes: |
  After the workflow_ref-check migration to .1.6, BuildSignerURI
  (.1.9) is informational/diagnostic only. Cert without it should
  still verify. An SDK that requires .1.9 for the workflow_ref
  check (old Rust behavior) would reject — fixture catches
  regression.
