id: 450-tcb-bl-spl-below-min
stage: verify-attestation-sev
title: |
  policy.min_tcb_bl_spl above actual current_tcb.bl_spl → TCB_OUT_OF_DATE.
spec_refs: ["3.7"]
expects:
  exit_code: 10
  rejection_code: "TCB_OUT_OF_DATE"
required_capabilities:
  attestation_sev.supported: true
  attestation_sev.injected_collateral_supported: true
  attestation_sev.extended_checks_supported: true
fixture_kind: real-frozen-bundle-policy-pin
notes: |
  Real bundle has current_tcb.bl_spl=10. Pin minimum=20. Per
  SPEC §3.7 the SDK MUST reject reports whose TCB is below the
  caller's minimum — TCB_OUT_OF_DATE. Same pattern for tee_spl,
  snp_spl, ucode_spl (see fixture 451).
