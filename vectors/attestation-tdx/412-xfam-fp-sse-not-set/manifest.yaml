id: 412-xfam-fp-sse-not-set
stage: verify-attestation-tdx
title: |
  Synth quote with XFAM bit 0 (FP) clear → reject.
spec_refs: ["4.8.1"]
expects:
  exit_code: 10
  rejection_code: "XFAM_REQUIRED_BIT_CLEAR"
required_capabilities:
  attestation_tdx.supported: true
  attestation_tdx.injected_collateral_supported: true
  attestation_tdx.tcb_evaluation_supported: true
  attestation_tdx.extended_td_checks_supported: true
fixture_kind: synthetic-spec-violation
notes: |
  SPEC §4.8.1: XFAM_FIXED1 = 0x00000003 (FP + SSE required).
  Quote MUST have bits 0 and 1 set. Synth quote sets XFAM=0x2
  (SSE set, FP cleared) — fails required-bit check.
