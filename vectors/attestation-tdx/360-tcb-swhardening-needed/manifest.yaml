id: 360-tcb-swhardening-needed
stage: verify-attestation-tdx
title: |
  TCB level SWHardeningNeeded → qv_result=SW_HARDENING_NEEDED (non-terminal).
spec_refs: ["4.7.7"]
expects:
  exit_code: 10
  rejection_code: ["TCB_REVOKED", "QV_RESULT_NOT_ACCEPTED_BY_POLICY", "QV_RESULT_TERMINAL_UNSPECIFIED"]
required_capabilities:
  attestation_tdx.supported: true
  attestation_tdx.injected_collateral_supported: true
  attestation_tdx.tcb_evaluation_supported: true
fixture_kind: synthetic-intel-chain
notes: |
  Intel §B.1: SWHardeningNeeded is non-terminal but SDKs that
  default to strict-only acceptance reject it. tinfoil-go's
  current Phase 3 wiring treats any non-OK qv_result as
  rejection. Permissive-policy fixtures land separately.
  
  go-tdx-guest lib limitation: every non-UpToDate status maps
  to the same ErrTcbStatus sentinel — the lib doesn't surface
  the specific qv_result enum (SW_HARDENING_NEEDED vs CONFIG_
  NEEDED vs OUT_OF_DATE etc.) the way Intel's §B.1 specifies.
  TCB_REVOKED is the conformance code that captures this; the
  non-terminal/terminal distinction the SPEC mandates is lost
  at the lib boundary.
