id: 450-rtmr3-pinned-mismatch
stage: verify-attestation-tdx
title: |
  RTMR3 pinned non-zero; real quote is all-zero → reject.
spec_refs: ["4.10", "7.3.6"]
expects:
  exit_code: 10
  rejection_code: "RTMR3_NONZERO"
required_capabilities:
  attestation_tdx.supported: true
  attestation_tdx.injected_collateral_supported: true
  attestation_tdx.extended_td_checks_supported: true
fixture_kind: synthetic-policy-pin
notes: |
  SPEC §7.3.6 carries to TDX: RTMR3 MUST be all zeros. Real
  quote satisfies. Pinning non-zero verifies the binary applies
  the pin (catches a verifier that extracts RTMR3 but never
  compares it).
