spec_refs: ["4.8.4"]
expects:
  exit_code: 10
  rejection_code: "MR_SIGNER_SEAM_MISMATCH"
required_capabilities:
  attestation_tdx.supported: true
  attestation_tdx.injected_collateral_supported: true
  attestation_tdx.extended_td_checks_supported: true
fixture_kind: synthetic-policy-pin
notes: |
  SPEC §4.8.4 requires MR_SIGNER_SEAM be all-zero for current
  Intel TDX module releases. Real quote satisfies that. Pinning
  the policy to a non-zero expected value triggers a mismatch,
  demonstrating the binary enforces the pin even when the SPEC
  default would have been satisfied.
