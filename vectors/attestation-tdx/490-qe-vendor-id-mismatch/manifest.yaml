id: 490-qe-vendor-id-mismatch
stage: verify-attestation-tdx
title: |
  QE Vendor ID pinned to a non-Intel value → real quote has Intel UUID → reject.
spec_refs: ["4.8.6"]
expects:
  exit_code: 10
  rejection_code: "QE_VENDOR_ID_MISMATCH"
required_capabilities:
  attestation_tdx.supported: true
  attestation_tdx.injected_collateral_supported: true
  attestation_tdx.extended_td_checks_supported: true
fixture_kind: synthetic-policy-pin
notes: |
  SPEC §4.8.6 default is 939a7233f79c4ca9940a0db3957f0607
  (Intel). Real quote matches. Pinning a different UUID
  demonstrates the binary applies the QE Vendor pin (catches an
  SDK that reads the field but never compares it).
