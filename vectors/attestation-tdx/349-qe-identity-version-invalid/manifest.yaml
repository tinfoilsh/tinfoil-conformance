id: 349-qe-identity-version-invalid
stage: verify-attestation-tdx
title: |
  Signed QE Identity with version != 2 → QE_IDENTITY_VERSION_INVALID.
spec_refs: ["4.7.9"]
expects:
  exit_code: 10
  rejection_code: "QE_IDENTITY_VERSION_INVALID"
required_capabilities:
  attestation_tdx.supported: true
  attestation_tdx.injected_collateral_supported: true
  attestation_tdx.tcb_evaluation_supported: true
fixture_kind: synthetic-intel-chain
notes: |
  The QE Identity envelope is signed and fresh, but the inner
  version is 3 instead of the TDX-supported version 2. This
  guards parsers that accept future/foreign identity formats
  without an explicit compatibility decision.
