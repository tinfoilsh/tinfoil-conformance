id: 430-mrseam-not-in-allowlist
stage: verify-attestation-tdx
title: |
  MR_SEAM not in policy allowlist → reject (SPEC §4.8.5).
spec_refs: ["4.8.5"]
expects:
  exit_code: 10
  rejection_code: "MR_SEAM_NOT_ALLOWED"
required_capabilities:
  attestation_tdx.supported: true
  attestation_tdx.injected_collateral_supported: true
  attestation_tdx.extended_td_checks_supported: true
fixture_kind: synthetic-policy-pin
notes: |
  SPEC §4.8.5 requires exact 48-byte match against a list of
  known-good Intel TDX module MR_SEAM values. Real quote's
  MR_SEAM is 2fd279c1...c656; allowlist contains two other
  values from the SPEC §4.8.5 table (TDX 2.0.08 and 1.5.16).
  Neither matches → MR_SEAM_NOT_ALLOWED.
